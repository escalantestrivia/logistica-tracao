<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Logística da Tração</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <header class="topbar">

        <div class="logo">
            LOGÍSTICA DA TRAÇÃO
        </div>

        <div class="dados-relatorio">

            <span id="nomeOperador">---</span>

            <span id="matriculaOperador">---</span>

            <span id="posto">---</span>

            <span id="local">---</span>

            <span id="turno">---</span>

            <span id="data">---</span>

        </div>

    </header>


    <div class="container-app">

        <aside class="sidebar">

            <button class="menu-item active" data-view="identificacao">
                <i class="bi bi-person-badge"></i>
                Identificação
            </button>

            <button class="menu-item" data-view="checklist" disabled>
                <i class="bi bi-check2-square"></i>
                Check List
            </button>

            <button class="menu-item" data-view="fatos" disabled>
                <i class="bi bi-journal-text"></i>
                Fatos Relevantes
            </button>

            <button class="menu-item" data-view="locomotivas" disabled>
                <i class="bi bi-train-front"></i>
                Locomotivas
            </button>

            <button class="menu-item" data-view="historico" disabled>
                <i class="bi bi-clock-history"></i>
                Histórico
            </button>

            <hr>

            <button class="menu-item text-success" data-view="finalizar" disabled>
                <i class="bi bi-file-earmark-pdf"></i>
                Finalizar Relatório
            </button>

        </aside>


        <main id="conteudo">

        </main>

    </div>


    <script src="assets/js/app.js"></script>

</body>

</html>
