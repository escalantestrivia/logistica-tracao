<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logística da Tração</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">LOGÍSTICA DA TRAÇÃO</span>

        <div class="text-white">
            <span id="lblNome"></span>
            |
            <span id="lblMatricula"></span>
        </div>
    </div>
</nav>

<div class="container-fluid mt-3">
    <div class="row">

        <div class="col-md-3">

            <div class="list-group">

                <button id="menuIdentificacao" class="list-group-item list-group-item-action active"
                    onclick="mostrarTela('identificacao')">
                    Identificação
                </button>

                <button id="menuChecklist" class="list-group-item list-group-item-action"
                    onclick="mostrarTela('checklist')">
                    Check List
                </button>

                <button id="menuFatos" class="list-group-item list-group-item-action"
                    onclick="mostrarTela('fatos')">
                    Fatos Relevantes
                </button>

                <button id="menuLocomotivas" class="list-group-item list-group-item-action"
                    onclick="mostrarTela('locomotivas')">
                    Locomotivas
                </button>

                <button id="menuHistorico" class="list-group-item list-group-item-action"
                    onclick="mostrarTela('historico')">
                    Histórico
                </button>

                <hr>

                <button class="btn btn-success" onclick="finalizarRelatorio()">
                    Finalizar Relatório
                </button>

            </div>

        </div>

        <div class="col-md-9">

            <div id="identificacao">

                <div class="card shadow">

                    <div class="card-header">
                        <h4 class="mb-0">Identificação do Relatório</h4>
                    </div>

                    <div class="card-body">

                        <div class="row">

                            <div class="col-md-8 mb-3">
                                <label class="form-label">Nome</label>
                                <input type="text" id="txtNome" class="form-control" readonly>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Matrícula</label>
                                <input type="text" id="txtMatricula" class="form-control" readonly>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Posto</label>
                                <select id="cmbPosto" class="form-select">
                                    <option value="">Selecione</option>
                                    <option>BAS</option>
                                    <option>SUZ</option>
                                </select>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Turno</label>
                                <select id="cmbTurno" class="form-select">
                                    <option value="">Selecione</option>
                                    <option>Manhã</option>
                                    <option>Tarde</option>
                                    <option>Noite</option>
                                </select>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Data</label>
                                <input type="date" id="txtData" class="form-control">
                            </div>

                        </div>

                        <div class="text-end">
                            <button class="btn btn-primary" onclick="iniciarRelatorio()">
                                <i class="bi bi-play-fill"></i> Iniciar Relatório
                            </button>
                        </div>

                    </div>

                </div>

            </div>

<div id="checklist" style="display:none;">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Check List</h4>
        </div>

        <div class="card-body">

            <h5 class="mb-3">Gestão de Operadores</h5>

            <div class="row text-center g-2">

                <div class="col">
                    <label class="form-label">Controle</label>
                    <input type="number" id="controleApresentacao" class="form-control form-control-lg text-center" value="0">
                </div>

                <div class="col">
                    <label class="form-label">Frota Eq.</label>
                    <input type="number" id="frotaEquipada" class="form-control form-control-lg text-center" value="0">
                </div>

                <div class="col">
                    <label class="form-label">Ausências</label>
                    <input type="number" id="ausencias" class="form-control form-control-lg text-center" value="0">
                </div>

                <div class="col">
                    <label class="form-label">Viras</label>
                    <input type="number" id="viras" class="form-control form-control-lg text-center" value="0">
                </div>

                <div class="col">
                    <label class="form-label">Posto Escala</label>
                    <input type="number" id="postoEscala" class="form-control form-control-lg text-center" value="0">
                </div>

                <div class="col">
                    <label class="form-label">Outros</label>
                    <input type="number" id="outros" class="form-control form-control-lg text-center" value="0">
                </div>

            </div>

            <div class="text-center mt-4">

                <h5>Total Gestão</h5>

                <h2 id="totalGestao" class="text-primary fw-bold">0</h2>

            </div>

            <hr>

            <div class="d-flex justify-content-between align-items-center">

                <div>

                    <strong>Frota Equipada</strong><br>

                    <small class="text-muted">
                        Clique para abrir a tabela de trens.
                    </small>

                </div>

                <button
                    class="btn btn-primary"
                    data-bs-toggle="modal"
                    data-bs-target="#modalFrota">

                    Abrir Frota Equipada

                </button>

            </div>

            <hr>

            <div class="text-end">

                <button
                    class="btn btn-success"
                    onclick="salvarChecklist()">

                    Salvar e Continuar

                </button>

            </div>

        </div>

    </div>

</div>

            <div id="fatos" style="display:none">
                <div class="card shadow">
                    <div class="card-body">
                        <h3>Fatos Relevantes</h3>
                    </div>
                </div>
            </div>

            <div id="locomotivas" style="display:none">
                <div class="card shadow">
                    <div class="card-body">
                        <h3>Locomotivas</h3>
                    </div>
                </div>
            </div>

            <div id="historico" style="display:none">
                <div class="card shadow">
                    <div class="card-body">
                        <h3>Histórico</h3>
                    </div>
                </div>
            </div>

        </div>

    </div>
</div>

<script src="app.js"></script>

<div class="modal fade" id="modalFrota" tabindex="-1">

    <div class="modal-dialog modal-xl modal-dialog-scrollable">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Frota Equipada
                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <div class="table-responsive">

                    <table class="table table-bordered table-hover" id="tabelaFrota">

                        <thead class="table-dark">

                            <tr>

                                <th style="width:70px;">Trem</th>
                                <th style="width:120px;">TUE</th>
                                <th style="width:220px;">Local</th>
                                <th>Operador</th>

                            </tr>

                        </thead>

                        <tbody id="tbodyTrens">

                        </tbody>

                    </table>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-success"
                    data-bs-dismiss="modal">

                    Concluir

                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
