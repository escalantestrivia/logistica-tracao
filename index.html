<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Logística da Tração</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar navbar-dark bg-primary">

        <div class="container-fluid">

            <span class="navbar-brand mb-0 h1">
                LOGÍSTICA DA TRAÇÃO
            </span>

            <div class="text-white">

                <span id="nomeOperador">---</span> |

                <span id="matriculaOperador">---</span>

            </div>

        </div>

    </nav>


    <div class="container-fluid mt-3">

        <div class="row">

            <div class="col-3">

                <div class="list-group">

                    <button class="list-group-item list-group-item-action active"
                        onclick="carregarView('identificacao')">

                        <i class="bi bi-person-badge"></i>

                        Identificação

                    </button>

                    <button class="list-group-item list-group-item-action"
                        id="btnChecklist"
                        disabled
                        onclick="carregarView('checklist')">

                        Check List

                    </button>

                    <button class="list-group-item list-group-item-action"
                        id="btnFatos"
                        disabled
                        onclick="carregarView('fatos')">

                        Fatos Relevantes

                    </button>

                    <button class="list-group-item list-group-item-action"
                        id="btnLocomotivas"
                        disabled
                        onclick="carregarView('locomotivas')">

                        Locomotivas

                    </button>

                    <button class="list-group-item list-group-item-action"
                        id="btnHistorico"
                        disabled
                        onclick="carregarView('historico')">

                        Histórico

                    </button>

                    <button class="list-group-item list-group-item-action text-success"
                        id="btnFinalizar"
                        disabled>

                        Finalizar Relatório

                    </button>

                </div>

            </div>

            <div class="col-9">

                <div id="conteudo">

                </div>

            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
