<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Logística da Tração - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:420px;
            border:none;
            border-radius:12px;
        }

        .card-header{
            background:#0d6efd;
            color:#fff;
            text-align:center;
            font-size:24px;
            font-weight:bold;
            padding:20px;
        }

        .logo{
            font-size:70px;
            color:#0d6efd;
            text-align:center;
            margin-bottom:15px;
        }

    </style>

</head>

<body>

<div class="card shadow-lg">

    <div class="card-header">

        LOGÍSTICA DA TRAÇÃO

    </div>

    <div class="card-body p-4">

        <div class="logo">

            <i class="bi bi-train-front-fill"></i>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Matrícula

            </label>

            <input
                type="text"
                id="txtMatricula"
                class="form-control"
                placeholder="Digite sua matrícula">

        </div>

        <div class="mb-4">

            <label class="form-label">

                Senha

            </label>

            <input
                type="password"
                id="txtSenha"
                class="form-control"
                placeholder="Digite sua senha">

        </div>

        <div class="d-grid">

            <button
                class="btn btn-primary btn-lg"
                onclick="login()">

                <i class="bi bi-box-arrow-in-right"></i>

                Entrar

            </button>

        </div>

    </div>

</div>

<script>

async function login() {

    const matricula = document.getElementById("txtMatricula").value.trim();

    const senha = document.getElementById("txtSenha").value;

    try {

        const resposta = await fetch("usuarios.json");

        const usuarios = await resposta.json();

        const usuario = usuarios.find(u =>

            u.matricula === matricula &&
            u.senha === senha

        );

        if (!usuario) {

            alert("Matrícula ou senha inválidas.");

            return;

        }

        localStorage.setItem("usuario", JSON.stringify(usuario));

        window.location.href = "index.html";

    }

    catch (erro) {

        alert("Erro ao carregar usuários.");

        console.error(erro);

    }

}

document.getElementById("txtSenha").addEventListener("keypress",function(e){

    if(e.key==="Enter"){

        login();

    }

});

</script>

</body>

</html>
