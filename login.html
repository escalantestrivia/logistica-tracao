<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Logística da Tração</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card shadow" style="width:380px">
<div class="card-header text-center bg-primary text-white">
<h4 class="mb-0">LOGÍSTICA DA TRAÇÃO</h4>
</div>
<div class="card-body">

<div class="text-center fs-1 mb-3">
<i class="bi bi-train-front-fill"></i>
</div>

<label class="form-label">Matrícula</label>
<input id="txtMatricula" class="form-control" placeholder="Digite sua matrícula">

<div class="d-grid mt-4">
<button class="btn btn-primary" onclick="login()">
<i class="bi bi-box-arrow-in-right"></i> Entrar
</button>
</div>

</div>
</div>

<script>
window.onload=()=>{
localStorage.removeItem("usuario");
document.getElementById("txtMatricula").focus();
};

async function login(){
const matricula=document.getElementById("txtMatricula").value.trim();

if(!matricula){
alert("Informe a matrícula.");
return;
}

const resposta=await fetch("./patetas.json");
const patetas=await resposta.json();

const usuario=patetas.find(u=>u.matricula===matricula);

if(!usuario){
alert("Matrícula não cadastrada.");
return;
}

localStorage.setItem("usuario",JSON.stringify(usuario));
location.href="index.html";
}

document.getElementById("txtMatricula").addEventListener("keydown",e=>{
if(e.key==="Enter") login();
});
</script>

</body>
</html>
